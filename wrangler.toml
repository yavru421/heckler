name = "heckler"
main = "backend/src/index.ts"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat"]

[build]
command = "bash build.sh"

[assets]
directory = "output/wwwroot"

[[d1_databases]]
binding = "DB"
database_name = "heckler-ledger"
database_id = "054a359a-b42f-4156-a6ee-6b7a6e7b848c"
migrations_dir = "backend/migrations"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "COMEDIAN_DO"
class_name = "ComedianDO"

[[migrations]]
tag = "v1"
new_classes = ["ComedianDO"]

