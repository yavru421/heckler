    <script>
        window.errors = [];
        window.onerror = function(message, source, lineno, colno, error) {
            window.errors.push({message: message, source: source, lineno: lineno, error: error ? error.stack : null});
            return false;
        };
        window.onunhandledrejection = function(event) {
            window.errors.push({message: "Unhandled promise rejection: " + event.reason});
        };

        // Register service worker normally for PWA loading experience
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(registration => {
                registration.onupdatefound = () => {
                    const installingWorker = registration.installing;
                    if (installingWorker == null) return;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('New content available. Please refresh.');
                        }
                    };
                };
            });
        }
    </script>
